<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Drag Scroll</title>
</head>
<body>

<div class="items" style="
  width: 600px;
  height: 200px;           /* 🔥 MUST HAVE */
  border: 2px solid black;
  overflow-x: auto;        /* 🔥 scroll required */
  overflow-y: hidden;
  white-space: nowrap;
  display: block;          /* 🔥 ensure visible */
">
  <div class="cube"></div>
  <div class="cube"></div>
  <div class="cube"></div>
  <div class="cube"></div>
  <div class="cube"></div>
  <div class="cube"></div>
</div>

<style>
.cube {
  width: 150px;
  height: 150px;
  background: teal;
  display: inline-block;
  margin: 10px;
}
</style>

<script>
const items = document.querySelector('.items');

let isDown = false;
let startX;
let scrollLeft;

items.addEventListener('mousedown', (e) => {
  isDown = true;
  startX = e.pageX;
  scrollLeft = items.scrollLeft;
});

items.addEventListener('mousemove', (e) => {
  if (!isDown) return;

  const walk = (e.pageX - startX) * 2;
  items.scrollLeft = scrollLeft - walk;
});

items.addEventListener('mouseup', () => {
  isDown = false;
});

items.addEventListener('mouseleave', () => {
  isDown = false;
});
</script>

</body>
</html>
